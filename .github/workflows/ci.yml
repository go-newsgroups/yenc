name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  CGO_ENABLED: 0
  GOWORK: off

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
      - name: Vet
        run: go vet ./...
      - name: Test with coverage
        run: go test -covermode=set -coverprofile=cover.out ./...
      - name: Enforce 100% coverage
        run: |
          pct=$(go tool cover -func=cover.out | awk '/^total:/{print $3}' | tr -d '%')
          echo "total coverage: ${pct}%"
          awk -v p="$pct" 'BEGIN{exit (p+0<100.0)?1:0}'

  cross-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - {goos: linux,   goarch: amd64}
          - {goos: linux,   goarch: arm64}
          - {goos: linux,   goarch: riscv64}
          - {goos: linux,   goarch: ppc64le}
          - {goos: linux,   goarch: s390x}
          - {goos: linux,   goarch: loong64}
          - {goos: darwin,  goarch: amd64}
          - {goos: darwin,  goarch: arm64}
          - {goos: windows, goarch: amd64}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
      - name: Build ${{ matrix.target.goos }}/${{ matrix.target.goarch }}
        env:
          GOOS: ${{ matrix.target.goos }}
          GOARCH: ${{ matrix.target.goarch }}
        run: go build ./...
